# Playbook — Shared Defaults
# Project-specific settings go in each repo's playbook.yaml

concurrency:
  max_coding: 1
  max_testing: 1
  max_review: 1

timeouts:
  coding_minutes: 60
  testing_minutes: 30
  review_minutes: 30

guardrails:
  max_files_changed: 10
  max_retry_cycles: 3

versioning:
  enabled: true
  auto_create_issues: false
  bootstrap_timeout_minutes: 120
  bootstrap_max_budget_usd: 5.0

statuses:
  backlog: "Backlog"
  ready: "ai-ready"
  in_progress: "ai-in-progress"
  testing: "ai-testing"
  review: "ai-review"
  complete: "ai-complete"
  done: "Done"
  blocked: "ai-blocked"
  error: "ai-error"

slack:
  webhook_url: "${SLACK_WEBHOOK_URL}"

learning:
  enabled: true
  project_distiller: true
  agent_craft_distiller: true
  playbook_repo: "BryGo1995/playbook"

metrics:
  enabled: true                    # master switch; set false to disable all metrics
  show_checks: false               # echo structural check + classification summaries to user; default false (for distribution)
  classification_budget_usd: 0.25  # per-version cap for the classification subagent
