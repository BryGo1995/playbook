# Playbook — Agent Orchestrator Configuration
# Before running: update repos/project settings and set GITHUB_TOKEN env var

repos:
  - BryGo1995/paint-ballas-auto

# Path to the Game Design Document (GDD/PRD) in the target repo
gdd_path: "docs/paint-ballas-gdd.md"

project:
  owner: "BryGo1995"
  number: 9
  status_field_id: "PVTSSF_lAHOAmiy_s4BTvqizhA8ggw"

concurrency:
  max_coding: 1    # sequential — safe default for game dev / tightly coupled repos
  max_testing: 1
  max_review: 1

timeouts:
  coding_minutes: 60
  testing_minutes: 30
  review_minutes: 30

guardrails:
  max_files_changed: 10
  max_retry_cycles: 3

branches:
  integration: "ai/dev"

versioning:
  enabled: true
  auto_create_issues: false
  bootstrap_timeout_minutes: 120
  bootstrap_max_budget_usd: 5.0

slack:
  webhook_url: "${SLACK_WEBHOOK_URL}"

statuses:
  backlog: "Backlog"
  ready: "ai-ready"
  in_progress: "ai-in-progress"
  testing: "ai-testing"
  review: "ai-review"
  complete: "ai-complete"
  done: "Done"
  blocked: "ai-blocked"
  error: "ai-error"
