# Copy this file to .github/workflows/integration-pr.yml in your target repo.
# Requires: BryGo1995/playbook to be public (or same org with workflow sharing).
# No secrets needed — uses the default GITHUB_TOKEN.

name: Integration PR

on:
  push:
    branches: [ai/dev-*]  # Triggers for version branches like ai/dev-v0.4, ai/dev-bootstrap

permissions:
  contents: read
  pull-requests: write
  issues: read

jobs:
  integration-pr:
    uses: BryGo1995/playbook/.github/workflows/integration-pr.yml@main
    with:
      integration_branch: ${{ github.ref_name }}
      base_branch: main
